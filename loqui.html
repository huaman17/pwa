<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Código Avanzado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #1a202c;
            --editor-bg: #232a35;
            --header-bg: #2d3748;
            --border-color: #4a5568;
            --accent-color: #4299e1;
            --html-color: #e34c26;
            --css-color: #264de4;
            --js-color: #f0db4f;
            --preview-color: #48bb78;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: #e2e8f0;
            margin: 0;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: var(--header-bg);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: bold;
            font-size: 1.25rem;
        }

        .logo-icon {
            color: var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #3182ce;
            transform: translateY(-1px);
        }

        .btn-icon {
            font-size: 0.875rem;
        }

        .panels-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .editor-header {
            background-color: var(--header-bg);
            color: #cbd5e0;
            padding: 0.5rem 1rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: var(--editor-bg);
            color: #e2e8f0;
            padding: 1rem;
            outline: none;
            border: none;
            resize: none;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            tab-size: 4;
        }

        textarea:focus {
            box-shadow: inset 0 0 0 1px var(--accent-color);
        }

        .code-info {
            position: absolute;
            bottom: 0.5rem;
            right: 0.75rem;
            font-size: 0.75rem;
            color: #718096;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }

        .resizer {
            background-color: var(--border-color);
            cursor: col-resize;
            width: 6px;
            height: 100%;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .resizer:hover, .resizer.active {
            background-color: var(--accent-color);
        }

        .resizer::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 1px;
            right: 1px;
            height: 40px;
            transform: translateY(-50%);
            background-color: var(--accent-color);
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .resizer:hover::after, .resizer.active::after {
            opacity: 1;
        }

        .preview-panel {
            flex: 1;
            background-color: white;
            border-left: 1px solid var(--border-color);
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            background-color: var(--header-bg);
            color: #cbd5e0;
            padding: 0.5rem 1rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preview-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .preview-btn {
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }

        .preview-btn:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }

        /* Tabs para móviles */
        .mobile-tabs {
            display: none;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            justify-content: space-around;
        }

        .mobile-tab {
            padding: 1rem;
            cursor: pointer;
            font-weight: 500;
            color: #a0aec0;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .mobile-tab.active {
            color: white;
        }

        .mobile-tab.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            border-radius: 3px 3px 0 0;
        }

        .mobile-tab[data-panel="html"].active::after { background-color: var(--html-color); }
        .mobile-tab[data-panel="css"].active::after { background-color: var(--css-color); }
        .mobile-tab[data-panel="js"].active::after { background-color: var(--js-color); }
        .mobile-tab[data-panel="preview"].active::after { background-color: var(--preview-color); }

        .tab-icon {
            font-size: 1.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .panels-container {
                flex-direction: column;
            }

            .editor-panel {
                display: none;
            }

            .preview-panel {
                border-left: none;
                border-top: 1px solid var(--border-color);
            }

            .resizer {
                display: none;
            }

            .mobile-tabs {
                display: flex;
            }

            .editor-panel.active {
                display: flex;
            }

            .header {
                padding: 0.5rem 1rem;
            }

            .logo-text {
                display: none;
            }

            .btn-text {
                display: none;
            }
        }

        /* Tema oscuro para scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--editor-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
</head>

<body>
    <div class="editor-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-code logo-icon"></i>
                <span class="logo-text">CodeEditor Pro</span>
            </div>
            <div class="controls">
                <button class="btn" id="run-btn">
                    <i class="fas fa-play btn-icon"></i>
                    <span class="btn-text">Ejecutar</span>
                </button>
                <button class="btn" id="save-btn">
                    <i class="fas fa-save btn-icon"></i>
                    <span class="btn-text">Guardar</span>
                </button>
            </div>
        </div>

        <!-- Tabs para móvil -->
        <div class="mobile-tabs">
            <div class="mobile-tab active" data-panel="html">
                <i class="fab fa-html5 tab-icon" style="color: var(--html-color);"></i>
                <span>HTML</span>
            </div>
            <div class="mobile-tab" data-panel="css">
                <i class="fab fa-css3-alt tab-icon" style="color: var(--css-color);"></i>
                <span>CSS</span>
            </div>
            <div class="mobile-tab" data-panel="js">
                <i class="fab fa-js-square tab-icon" style="color: var(--js-color);"></i>
                <span>JS</span>
            </div>
            <div class="mobile-tab" data-panel="preview">
                <i class="fas fa-eye tab-icon" style="color: var(--preview-color);"></i>
                <span>Vista Previa</span>
            </div>
        </div>

        <!-- Contenedor principal de los paneles -->
        <div class="panels-container">
            <!-- Panel de HTML -->
            <div id="html-panel" class="editor-panel">
                <div class="editor-header" style="border-left: 4px solid var(--html-color);">
                    <i class="fab fa-html5" style="color: var(--html-color);"></i>
                    <span>HTML</span>
                </div>
                <div class="editor-content">
                    <textarea id="html-editor" placeholder="Escribe tu código HTML aquí..." spellcheck="false"></textarea>
                    <div class="code-info" id="html-info">0 líneas</div>
                </div>
            </div>

            <div class="resizer" id="html-css-resizer"></div>

            <!-- Panel de CSS -->
            <div id="css-panel" class="editor-panel">
                <div class="editor-header" style="border-left: 4px solid var(--css-color);">
                    <i class="fab fa-css3-alt" style="color: var(--css-color);"></i>
                    <span>CSS</span>
                </div>
                <div class="editor-content">
                    <textarea id="css-editor" placeholder="Escribe tu código CSS aquí..." spellcheck="false"></textarea>
                    <div class="code-info" id="css-info">0 líneas</div>
                </div>
            </div>

            <div class="resizer" id="css-js-resizer"></div>

            <!-- Panel de JavaScript -->
            <div id="js-panel" class="editor-panel">
                <div class="editor-header" style="border-left: 4px solid var(--js-color);">
                    <i class="fab fa-js-square" style="color: var(--js-color);"></i>
                    <span>JavaScript</span>
                </div>
                <div class="editor-content">
                    <textarea id="js-editor" placeholder="Escribe tu código JavaScript aquí..." spellcheck="false"></textarea>
                    <div class="code-info" id="js-info">0 líneas</div>
                </div>
            </div>
        </div>

        <!-- Panel de vista previa -->
        <div id="preview-panel" class="preview-panel">
            <div class="preview-header" style="border-left: 4px solid var(--preview-color);">
                <i class="fas fa-eye" style="color: var(--preview-color);"></i>
                <span>Vista Previa</span>
                <div class="preview-actions">
                    <button class="preview-btn" id="refresh-preview" title="Actualizar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="preview-btn" id="fullscreen-preview" title="Pantalla completa">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
            <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Elementos del DOM
            const htmlEditor = document.getElementById('html-editor');
            const cssEditor = document.getElementById('css-editor');
            const jsEditor = document.getElementById('js-editor');
            const previewFrame = document.getElementById('preview-iframe');
            const runBtn = document.getElementById('run-btn');
            const refreshBtn = document.getElementById('refresh-preview');
            const fullscreenBtn = document.getElementById('fullscreen-preview');
            const saveBtn = document.getElementById('save-btn');
            
            // Elementos de información
            const htmlInfo = document.getElementById('html-info');
            const cssInfo = document.getElementById('css-info');
            const jsInfo = document.getElementById('js-info');
            
            // Tabs móviles
            const mobileTabs = document.querySelectorAll('.mobile-tab');
            const panels = document.querySelectorAll('.editor-panel, .preview-panel');
            
            // Resizers
            const htmlCssResizer = document.getElementById('html-css-resizer');
            const cssJsResizer = document.getElementById('css-js-resizer');
            
            // Estado de la aplicación
            let isResizing = false;
            let currentResizer = null;
            
            // Código de ejemplo inicial
            const initialHtml = `<!DOCTYPE html>
<html>
<head>
    <title>Mi Página</title>
</head>
<body>
    <h1>Hola Mundo</h1>
    <p>Edita este código para ver los cambios en tiempo real.</p>
</body>
</html>`;
            
            const initialCss = `body {
    font-family: Arial, sans-serif;
    margin: 40px;
    line-height: 1.6;
}

h1 {
    color: #2d3748;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 10px;
}

p {
    color: #4a5568;
}`;
            
            const initialJs = `// Tu JavaScript aquí
document.addEventListener('DOMContentLoaded', function() {
    console.log('¡Documento cargado!');
    
    // Ejemplo de interacción
    const h1 = document.querySelector('h1');
    if (h1) {
        h1.addEventListener('click', () => {
            h1.style.color = h1.style.color === 'red' ? '#2d3748' : 'red';
        });
    }
});`;
            
            // Establecer código inicial
            htmlEditor.value = initialHtml;
            cssEditor.value = initialCss;
            jsEditor.value = initialJs;
            
            // Actualizar contadores de líneas
            updateLineCount(htmlEditor, htmlInfo);
            updateLineCount(cssEditor, cssInfo);
            updateLineCount(jsEditor, jsInfo);
            
            // Función para actualizar la vista previa
            function updatePreview() {
                const htmlCode = htmlEditor.value;
                const cssCode = `<style>${cssEditor.value}</style>`;
                const jsCode = `<script>${jsEditor.value}<\/script>`;
                
                const previewDoc = previewFrame.contentWindow.document;
                
                previewDoc.open();
                previewDoc.write(htmlCode + cssCode + jsCode);
                previewDoc.close();
            }
            
            // Función para actualizar el contador de líneas
            function updateLineCount(editor, infoElement) {
                const lines = editor.value.split('\n').length;
                infoElement.textContent = `${lines} línea${lines !== 1 ? 's' : ''}`;
            }
            
            // Función para manejar el redimensionamiento
            function initResizer(resizer, leftPanel, rightPanel) {
                resizer.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    currentResizer = resizer;
                    document.body.style.cursor = 'col-resize';
                    leftPanel.style.userSelect = 'none';
                    rightPanel.style.userSelect = 'none';
                    
                    // Previene la selección de texto durante el redimensionamiento
                    e.preventDefault();
                });
            }
            
            // Event Listeners
            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                if (currentResizer === htmlCssResizer) {
                    const containerRect = document.querySelector('.panels-container').getBoundingClientRect();
                    const leftPercent = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                    const rightPercent = 100 - leftPercent - 1; // 1% para el resizer
                    
                    document.getElementById('html-panel').style.flex = `0 0 ${leftPercent}%`;
                    document.getElementById('css-panel').style.flex = `0 0 ${rightPercent}%`;
                } else if (currentResizer === cssJsResizer) {
                    const containerRect = document.querySelector('.panels-container').getBoundingClientRect();
                    const leftPercent = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                    const rightPercent = 100 - leftPercent - 1; // 1% para el resizer
                    
                    document.getElementById('css-panel').style.flex = `0 0 ${leftPercent}%`;
                    document.getElementById('js-panel').style.flex = `0 0 ${rightPercent}%`;
                }
            });
            
            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    currentResizer = null;
                    document.body.style.cursor = '';
                    document.querySelectorAll('.editor-panel').forEach(panel => {
                        panel.style.userSelect = '';
                    });
                }
            });
            
            // Eventos para los editores
            htmlEditor.addEventListener('input', () => {
                updatePreview();
                updateLineCount(htmlEditor, htmlInfo);
            });
            
            cssEditor.addEventListener('input', () => {
                updatePreview();
                updateLineCount(cssEditor, cssInfo);
            });
            
            jsEditor.addEventListener('input', () => {
                updatePreview();
                updateLineCount(jsEditor, jsInfo);
            });
            
            // Botones de control
            runBtn.addEventListener('click', updatePreview);
            refreshBtn.addEventListener('click', updatePreview);
            
            fullscreenBtn.addEventListener('click', () => {
                if (previewFrame.requestFullscreen) {
                    previewFrame.requestFullscreen();
                } else if (previewFrame.webkitRequestFullscreen) {
                    previewFrame.webkitRequestFullscreen();
                } else if (previewFrame.msRequestFullscreen) {
                    previewFrame.msRequestFullscreen();
                }
            });
            
            saveBtn.addEventListener('click', () => {
                const blob = new Blob([
                    `HTML:\n${htmlEditor.value}\n\nCSS:\n${cssEditor.value}\n\nJavaScript:\n${jsEditor.value}`
                ], { type: 'text/plain' });
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'codigo.txt';
                a.click();
            });
            
            // Tabs móviles
            mobileTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const panelId = tab.getAttribute('data-panel');
                    
                    mobileTabs.forEach(t => t.classList.remove('active'));
                    panels.forEach(p => p.classList.remove('active'));
                    
                    tab.classList.add('active');
                    
                    if (panelId === 'preview') {
                        document.getElementById('preview-panel').classList.add('active');
                    } else {
                        document.getElementById(`${panelId}-panel`).classList.add('active');
                    }
                });
            });
            
            // Inicializar resizers
            initResizer(htmlCssResizer, document.getElementById('html-panel'), document.getElementById('css-panel'));
            initResizer(cssJsResizer, document.getElementById('css-panel'), document.getElementById('js-panel'));
            
            // Actualizar vista previa inicial
            updatePreview();
        });
    </script>
</body>

</html>
